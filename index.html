<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pneurama — Scanner</title>
  <style>
    body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Arial, sans-serif; }
    h2 { color: #fff; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; }
    p { color: #aaa; font-size: 0.85rem; margin-bottom: 20px; text-align: center; }
    video { width: 90vw; max-width: 400px; border-radius: 12px; border: 3px solid #e31e24; }
    #stato { color: #aaa; font-size: 0.8rem; margin-top: 12px; text-align: center; min-height: 20px; }
    .btn { background: #e31e24; color: white; border: none; font-weight: bold; padding: 12px 30px; border-radius: 8px; font-size: 1rem; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
  </style>
</head>
<body>
  <h2>PNEURAMA</h2>
  <p>Inquadra il QR Code del cliente</p>
  <video id="video" autoplay playsinline muted></video>
  <div id="stato">Avvio fotocamera...</div>
  <button class="btn" onclick="location.reload()">🔄 Riavvia</button>

  <script>
    // ⚠️ SOSTITUISCI CON IL TUO URL APPS SCRIPT
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyl3BJFMEoGzEBDCbGq9bKlfsCdimNhlZHO4Upc43gbeTRh3s0pMk__RQMGqseb0SfS/exec";

    var video = document.getElementById('video');
    var stato = document.getElementById('stato');
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    var intervallo = null;

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    })
    .then(function(stream) {
      video.srcObject = stream;
      stato.innerText = '🟢 Fotocamera attiva — inquadra il QR';

      video.addEventListener('loadedmetadata', function() {
        intervallo = setInterval(function() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            // Usa BarcodeDetector se disponibile (Chrome Android), altrimenti mostra errore
            if ('BarcodeDetector' in window) {
              var detector = new BarcodeDetector({ formats: ['qr_code'] });
              detector.detect(canvas).then(function(risultati) {
                if (risultati.length > 0) {
                  clearInterval(intervallo);
                  stream.getTracks().forEach(function(t) { t.stop(); });
                  elaboraQr(risultati[0].rawValue);
                }
              });
            }
          }
        }, 300);
      });
    })
    .catch(function(err) {
      stato.innerHTML = '<span style="color:#e31e24;">❌ ' + err.message + '</span>';
    });

    function elaboraQr(urlLetta) {
      try {
        var url = new URL(urlLetta);
        var t = url.searchParams.get("targa") || "";
        var e = url.searchParams.get("email") || "";
        if (!t || !e) throw new Error();
        stato.innerText = '✅ QR letto: ' + t.toUpperCase();
        // Reindirizza ad Apps Script con i dati
        window.location.href = APPS_SCRIPT_URL + "?meccanico=si&targa=" + encodeURIComponent(t) + "&email=" + encodeURIComponent(e);
      } catch(err) {
        stato.innerHTML = '<span style="color:#e31e24;">❌ QR non valido. Riprova.</span>';
      }
    }
  </script>
</body>
</html>
